# Production compose file for fleet devices.
#
# HOW FLEET DEPLOYMENT WORKS (pull-based / Watchtower):
#
#   1. CI pushes a new image to ghcr.io/navidyou/mimoe-local-agent:latest
#      every time a commit lands on main.
#
#   2. Each device runs this compose file. The `watchtower` service polls GHCR
#      every 5 minutes. When it sees a new digest on :latest it:
#        a. Pulls the new image
#        b. Stops and removes the running `agent` container
#        c. Starts a new `agent` container from the new image
#        d. Removes the old image to save disk space
#
#   3. The `agent` container connects to the local mimOE node via
#      host.docker.internal — each device uses its OWN local model.
#      No central inference server is involved.
#
# FIRST-TIME SETUP ON A DEVICE:
#
#   # 1. Log in to GHCR so Watchtower can pull the private image
#   echo <GITHUB_PAT> | docker login ghcr.io -u <github-username> --password-stdin
#
#   # 2. Copy this file and a .env to the device
#   mkdir ~/mimoe-agent && cd ~/mimoe-agent
#   cp docker-compose.prod.yml .
#   cp .env.example .env   # adjust MIMOE_MODEL etc.
#
#   # 3. Start everything
#   docker compose -f docker-compose.prod.yml up -d
#
#   # Watchtower will keep it updated from here on automatically.
#
# GITHUB PAT SCOPE:
#   The PAT only needs `read:packages` — it never writes to the repo.
#   Create one at: GitHub → Settings → Developer settings → Personal access tokens
#
# NOTE: mimOE runs NATIVELY on the device, not in this compose file.
#       Never containerize mimOE — it loses hardware acceleration and
#       mimik's peer-to-peer mesh networking.

services:
  agent:
    image: ghcr.io/navidyou/mimoe-local-agent:latest
    container_name: mimoe-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Reach mimOE running natively on the Docker host.
      # host.docker.internal resolves via extra_hosts on Linux below.
      MIMOE_BASE_URL: http://host.docker.internal:8083/mimik-ai/openai/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: mimoe-watchtower
    restart: unless-stopped
    volumes:
      # Needs Docker socket to restart containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Passes GHCR credentials so it can pull private images
      - ${HOME}/.docker/config.json:/config.json:ro
    environment:
      WATCHTOWER_POLL_INTERVAL: "300"       # check GHCR every 5 minutes
      WATCHTOWER_CLEANUP: "true"            # delete old image after update
      WATCHTOWER_INCLUDE_STOPPED: "false"
      WATCHTOWER_NO_STARTUP_MESSAGE: "true"
      DOCKER_CONFIG: /config.json
    # Only watch the agent container — don't accidentally update watchtower itself
    # or any other containers running on the device.
    command: mimoe-agent
