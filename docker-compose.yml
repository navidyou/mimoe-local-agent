# Development compose file — builds the image locally from source.
# For production / fleet deployment use docker-compose.prod.yml instead,
# which pulls the pre-built image from GHCR and runs Watchtower for
# automatic updates.
#
# Usage:
#   docker compose run --rm agent -q "what is 6 * 7?"
#   docker compose run --rm agent --trace
#
# IMPORTANT: mimOE runs NATIVELY on the host — do not containerize it.

services:
  agent:
    build: .
    env_file:
      - .env   # copy .env.example to .env and adjust
    environment:
      # Override base URL to reach mimOE running on the Docker host.
      # On macOS/Windows: host.docker.internal resolves automatically.
      # On Linux: uncomment extra_hosts below.
      MIMOE_BASE_URL: http://host.docker.internal:8083/mimik-ai/openai/v1
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
