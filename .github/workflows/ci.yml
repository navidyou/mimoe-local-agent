name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check agent/ tests/

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: mypy agent/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: typecheck
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest --cov=agent --cov-report=xml --cov-fail-under=60 -q
      - uses: actions/upload-artifact@v4.6.2
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: coverage.xml

  # ── Integration tests ────────────────────────────────────────────────────────
  # Require a real mimOE node — skipped in CI by default.
  # Set the MIMOE_AVAILABLE variable to "true" and provide MIMOE_BASE_URL to enable.
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    if: ${{ vars.MIMOE_AVAILABLE == 'true' }}
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest -q -m integration
        env:
          MIMOE_BASE_URL: ${{ vars.MIMOE_BASE_URL }}
          MIMOE_API_KEY: ${{ secrets.MIMOE_API_KEY }}
          MIMOE_MODEL: ${{ vars.MIMOE_MODEL }}
